<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>欢迎页</title>
    <link rel="stylesheet" href="../../static/frame/layui/css/layui.css">
    <link rel="stylesheet" href="../../static/frame/static/css/style.css">
    <link rel="icon" href="../../static/frame/static/image/code.png">
</head>
<body class="body">
    <div class="layui-row layui-col-space10 my-index-main">
        <form class="layui-form" action="" method="post">
            <div class="layui-form-item">
                <label class="layui-form-label">代理ID</label>
                <div class="layui-input-block">
                    <input type="text" name="userid" placeholder="请输入代理ID" autocomplete="off" class="layui-input" required>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">新上级ID</label>
                <div class="layui-input-block">
                    <input type="text" name="newid" placeholder="请输入新上级ID" autocomplete="off" class="layui-input" required>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button class="layui-btn" type="submit" lay-submit lay-filter="submitForm">立即提交</button>
                </div>
            </div>
        </form>
    </div>

    <!-- 引入 jQuery -->
    <script src="../../static/jquery-3.3.1.js"></script>
    <!-- 引入 layui -->
    <script type="text/javascript" src="../../static/frame/layui/layui.js"></script>
    <!-- 引入自定义脚本 -->
    <script type="text/javascript" src="../../static/js/index.js"></script>
    <!-- 引入 ECharts -->
    <script type="text/javascript" src="../../static/frame/echarts/echarts.min.js"></script>
    <script type="text/javascript">
        layui.use(['form', 'layer', 'vip_tab'], function () {
            var form = layui.form;
            var layer = layui.layer;

            // 打开选项卡
            $('.my-nav-btn').on('click', function () {
                if ($(this).attr('data-href')) {
                    vipTab.add($(this), '<i class="layui-icon">' + $(this).find("button").html() + '</i>' + $(this).find('p:last-child').html(), $(this).attr('data-href'));
                }
            });

            // 表单提交事件
            form.on('submit(submitForm)', function(data) {
                var loading = layer.load(1, { shade: [0.3, '#000'] }); // 显示加载层
                var $button = $(this).find('button[type=submit]');
                $button.prop('disabled', true).text('提交中...'); // 禁用按钮并更改文本

                $.ajax({
                    url: '../ajax.php?mod=dlhb',
                    type: 'POST',
                    dataType: 'html', // 更改为 'html'
                    data: {
                        userid: data.field.userid,
                        newid: data.field.newid
                    },
                    success: function(response) {
                        layer.close(loading);
                        // 显示提示框，内容为服务器返回的 HTML
                        layer.open({
                            type: 1, // 页面层
                            title: '操作结果',
                            area: ['400px', '300px'], // 提示框大小
                            content: response, // 服务器返回的 HTML 内容
                            btn: ['确定'],
                            yes: function(index, layero) {
                                layer.close(index);
                                // 可选：重置表单或执行其他操作
                            }
                        });
                    },
                    error: function(jqXHR, textStatus, errorThrown) {
                        layer.close(loading);
                        layer.msg('请求失败: ' + textStatus, { icon: 2, time: 2000 });
                    },
                    complete: function() {
                        $button.prop('disabled', false).text('立即提交'); // 恢复按钮
                    }
                });

                return false; // 阻止表单默认提交
            });
        });
    </script>
</body>
</html>
