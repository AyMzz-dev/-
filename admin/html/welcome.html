<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>欢迎页</title>
    <link rel="stylesheet" href="../../static/frame/layui/css/layui.css">
    <link rel="stylesheet" href="../../static/frame/static/css/style.css">
    <link rel="icon" href="../../static/frame/static/image/code.png">
</head>
<body class="body">

<div class="layui-row layui-col-space10 my-index-main">
    <div class="layui-col-xs4 layui-col-sm2 layui-col-md2">
        <div class="my-nav-btn layui-clear">
            <div class="layui-col-md12">
                <button class="layui-btn layui-btn-big layui-btn-danger layui-icon">&#xe632;</button>
            </div>
            <div class="layui-col-md12 tc">
                <p class="my-nav-text" id="appnum">loading</p>
                <p class="my-nav-text layui-elip">应用数量</p>
            </div>
        </div>
    </div>
    <div class="layui-col-xs4 layui-col-sm2 layui-col-md2">
        <div class="my-nav-btn layui-clear">
            <div class="layui-col-md12">
                <button class="layui-btn layui-btn-big layui-btn-warm layui-icon">&#xe735;</button>
            </div>
            <div class="layui-col-md12 tc">
                <p class="my-nav-text" id="sysver">loading</p>
                <p class="my-nav-text layui-elip">系统版本</p>
            </div>
        </div>
    </div>
    <div class="layui-col-xs4 layui-col-sm2 layui-col-md2">
        <div class="my-nav-btn layui-clear">
            <div class="layui-col-md12">
                <button class="layui-btn layui-btn-big layui-icon" style="background-color: #5FB878;">&#xe653;</button>
            </div>
            <div class="layui-col-md12 tc">
                <p class="my-nav-text" id="czkeynum">loading</p>
                <p class="my-nav-text layui-elip">充值卡密</p>
            </div>
        </div>
    </div>
    <div class="layui-col-xs4 layui-col-sm2 layui-col-md2">
        <div class="my-nav-btn layui-clear">
            <div class="layui-col-md12">
                <button class="layui-btn layui-btn-big layui-btn-normal layui-icon">&#xe705;</button>
            </div>
            <div class="layui-col-md12 tc">
                <p class="my-nav-text" id="tckeynum">loading</p>
                <p class="my-nav-text layui-elip">套餐卡密</p>
            </div>
        </div>
    </div>
    <div class="layui-col-xs4 layui-col-sm2 layui-col-md2">
        <div class="my-nav-btn layui-clear">
            <div class="layui-col-md12">
                <button class="layui-btn layui-btn-big layui-icon">&#xe613;</button>
            </div>
            <div class="layui-col-md12 tc">
                <p class="my-nav-text" id="agentnum">loading</p>
                <p class="my-nav-text layui-elip">代理数量</p>
            </div>
        </div>
    </div>
    <div class="layui-col-xs4 layui-col-sm2 layui-col-md2">
        <div class="my-nav-btn layui-clear">
            <div class="layui-col-md12">
                <button class="layui-btn layui-btn-big layui-bg-black layui-icon">&#xe698;</button>
            </div>
            <div class="layui-col-md12 tc">
                <p class="my-nav-text" id="tradenum">loading</p>
                <p class="my-nav-text layui-elip">订单数量</p>
            </div>
        </div>
    </div>

    <div class="layui-col-xs12">
        <div class="layui-collapse">
            <div class="layui-colla-item">
                <h2 class="layui-colla-title">系统公告</h2>
                <div class="flow-default layui-colla-content layui-show" id="notice">

                </div>
            </div>
        </div>
    </div>
    <div class="layui-col-xs12">
        <div class="layui-collapse">
            <div class="layui-colla-item">
                <h2 class="layui-colla-title">系统更新</h2>
                <div class="flow-default layui-colla-content layui-show" id="updatePanel">
                    <div style="text-align:center;padding:30px;">
                        <div style="margin-bottom:15px;color:#666;" id="updateStatusText">检测是否有新版本可用</div>
                        <button class="layui-btn layui-btn-normal layui-btn-lg" id="btnCheckUpdate" onclick="checkUpdateNow()">
                            <i class="layui-icon">&#xe669;</i> 立即检查更新
                        </button>
                        <button class="layui-btn layui-btn-lg" id="btnDoUpdate" onclick="doUpdate()" style="display:none;background:linear-gradient(135deg,#6a11cb,#2575fc);border:none;">
                            <i class="layui-icon">&#xe653;</i> 一键更新
                        </button>
                        <div style="margin-top:10px;font-size:12px;color:#999;" id="updateResult"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="layui-col-xs12">
        <div class="layui-collapse">
            <div class="layui-colla-item">
                <h2 class="layui-colla-title">更新日志</h2>
                <div class="flow-default layui-colla-content layui-show" id="uplog">

                </div>
            </div>
        </div>
    </div>
</div>
<script src="../../static/jquery-3.3.1.js"></script>
<script type="text/javascript" src="../../static/frame/layui/layui.js"></script>
<script type="text/javascript" src="../../static/js/index.js"></script>
<script type="text/javascript" src="../../static/frame/echarts/echarts.min.js"></script>
<script type="text/javascript">
    layui.use(['flow', 'element', 'layer', 'vip_tab'], function () {
        // 打开选项卡
        var flow = layui.flow, vipTab = layui.vip_tab;
        $('.my-nav-btn').on('click', function () {
            if ($(this).attr('data-href')) {
                //vipTab.add('','标题','路径');
                vipTab.add($(this), '<i class="layui-icon">' + $(this).find("button").html() + '</i>' + $(this).find('p:last-child').html(), $(this).attr('data-href'));
            }
        });


        $.ajax({
            url: '../ajax.php?mod=getsysinfo',
            type: 'POST',
            dataType: 'json',
            data: '',
            success: function (data) {
                $('#appnum').html(data.appnum);
                $('#sysver').html(data.sysver);
                $('#czkeynum').html(data.czkeynum);
                $('#tckeynum').html(data.tckeynum);
                $('#agentnum').html(data.agentnum);
                $('#tradenum').html(data.tradenum);
            },
            error: function (data) {
                $('#appnum').html('error');
                $('#sysver').html('error');
                $('#czkeynum').html('error');
                $('#tckeynum').html('error');
                $('#agentnum').html('error');
                $('#tradenum').html('error');
            }
        });

        flow.load({
            elem: '#notice'
            , scrollElem: '#notice'
            , done: function (page, next) {
                var lis = [];
                $.ajax({
                    url: '../ajax.php?mod=getnotice',
                    type: 'POST',
                    dataType: 'html',
                    data: '',
                    success: function (data) {
                        $('#notice').html(data);
                        next();
                    },
                    error: function (data) {
                        $('#notice').html('嗷呜o(╥﹏╥)o 获取公告请求失败啦');
                        next();
                    }
                });
                //假设总页数为 6
            }
        });

        flow.load({
            elem: '#uplog'
            , scrollElem: '#uplog'
            , done: function (page, next) {
                var lis = [];
                $.ajax({
                    url: '../ajax.php?mod=getuplog',
                    type: 'POST',
                    dataType: 'html',
                    data: '',
                    success: function (data) {
                        $('#uplog').html('<div style="width: 100%;height: 800px;">\n' +
                            '      <textarea class="layui-textarea" style="width: 100%;height: 800px;">' + data + '</textarea>\n' +
                            '    </div>');
                        next();
                    },
                    error: function (data) {
                        $('#uplog').html('嗷呜o(╥﹏╥)o 获取系统更新日志失败啦');
                        next();
                    }
                });
                //假设总页数为 6
            }
        });


    });

    function checkUpdateNow() {
        var btn = $('#btnCheckUpdate');
        btn.prop('disabled', true).html('<i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop"></i> 检测中...');
        $('#updateResult').html('');

        $.ajax({
            url: '../ajax.php?mod=getversion',
            type: 'POST',
            dataType: 'json',
            success: function(data) {
                var localVer = data.version;
                $.ajax({
                    url: 'https://api.github.com/repos/AyMzz-dev/-/commits?per_page=1',
                    type: 'GET',
                    dataType: 'json',
                    headers: { 'Accept': 'application/vnd.github.v3+json' },
                    success: function(res) {
                        if (!res || res.length === 0) {
                            $('#updateStatusText').html('<span style="color:#ff4d4f;">无法获取远程版本信息</span>');
                            $('#updateResult').html('请前往 <a href="https://github.com/AyMzz-dev/-" target="_blank" style="color:#1890ff;">GitHub 仓库</a> 手动查看');
                            btn.prop('disabled', false).html('<i class="layui-icon">&#xe669;</i> 重新检测');
                            return;
                        }
                        var remoteSha = res[0].sha.substring(0, 7);
                        var commitMsg = res[0].commit.message.split('\n')[0];
                        var commitDate = new Date(res[0].commit.author.date).toLocaleString('zh-CN');
                        $.ajax({
                            url: '../ajax.php?mod=checkupdate',
                            type: 'POST',
                            dataType: 'json',
                            data: { 'remote_sha': remoteSha },
                            success: function(check) {
                                if (check.need_update) {
                                    $('#updateStatusText').html('<span style="color:#ff4d4f;font-weight:bold;">发现新版本，建议更新！</span>');
                                    $('#btnDoUpdate').show();
                                } else {
                                    $('#updateStatusText').html('<span style="color:#52c41a;font-weight:bold;">当前已是最新版本</span>');
                                    $('#btnDoUpdate').hide();
                                }
                                $('#updateResult').html('最新提交: ' + remoteSha + '<br>' + commitMsg + '<br>' + commitDate);
                            },
                            error: function() {
                                $('#updateStatusText').html('<span style="color:#1890ff;">本地版本: v' + localVer + '</span>');
                                $('#updateResult').html('最新提交: ' + remoteSha + '<br>' + commitMsg + '<br>' + commitDate);
                            },
                            complete: function() {
                                btn.prop('disabled', false).html('<i class="layui-icon">&#xe669;</i> 重新检测');
                            }
                        });
                    },
                    error: function(xhr) {
                        var msg = '网络请求失败';
                        if (xhr.status === 403) msg = 'GitHub API 调用频率超限，请稍后再试';
                        else if (xhr.status === 404) msg = '仓库不存在或为私有仓库';
                        $('#updateStatusText').html('<span style="color:#ff4d4f;">' + msg + '</span>');
                        btn.prop('disabled', false).html('<i class="layui-icon">&#xe669;</i> 重新检测');
                    }
                });
            },
            error: function() {
                $('#updateStatusText').html('<span style="color:#ff4d4f;">获取本地版本失败</span>');
                btn.prop('disabled', false).html('<i class="layui-icon">&#xe669;</i> 重新检测');
            }
        });
    }

    function doUpdate() {
        var btn = $('#btnDoUpdate');
        layer.confirm('确定要自动更新系统吗？<br><br><span style="color:#ff4d4f;">注意：更新过程中请勿关闭页面，更新完成后刷新即可。</span>', {
            title: '一键更新确认',
            btn: ['确定更新', '取消'],
            area: ['450px', '220px']
        }, function(index) {
            layer.close(index);
            btn.prop('disabled', true).html('<i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop"></i> 更新中...');
            $('#btnCheckUpdate').prop('disabled', true);
            $('#updateStatusText').html('<span style="color:#1890ff;">正在从 GitHub 下载更新...</span>');
            
            var loading = layer.load(2, {shade: [0.5, '#000']});
            $.ajax({
                url: '../ajax.php?mod=autoupdate',
                type: 'POST',
                dataType: 'json',
                timeout: 120000,
                success: function(data) {
                    layer.close(loading);
                    if (data.code == 1) {
                        $('#updateStatusText').html('<span style="color:#52c41a;font-weight:bold;">✓ 更新成功！已更新 ' + data.updated + ' 个文件</span>');
                        $('#updateResult').html('请刷新页面以应用更新。');
                        layer.alert('更新成功！已更新 ' + data.updated + ' 个文件。<br>请刷新页面以应用最新版本。', {icon: 1, title: '更新完成'});
                    } else {
                        $('#updateStatusText').html('<span style="color:#ff4d4f;">更新部分完成，' + data.errors + ' 个文件失败</span>');
                        layer.alert(data.msg, {icon: 2, title: '更新提示'});
                    }
                },
                error: function(xhr) {
                    layer.close(loading);
                    var msg = '更新请求失败';
                    if (xhr.status === 0) msg = '网络超时或服务器无响应';
                    $('#updateStatusText').html('<span style="color:#ff4d4f;">' + msg + '</span>');
                    layer.alert(msg + '<br>请检查服务器PHP Zip扩展是否安装，或手动更新。', {icon: 2, title: '更新失败'});
                },
                complete: function() {
                    btn.prop('disabled', false).html('<i class="layui-icon">&#xe653;</i> 一键更新');
                    $('#btnCheckUpdate').prop('disabled', false);
                }
            });
        });
    }

</script>
</body>
</html>
