<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>公告管理</title>
    <link rel="stylesheet" href="../../static/frame/layui/css/layui.css">
    <link rel="stylesheet" href="../../static/frame/static/css/style.css">
    <link rel="icon" href="../../static/frame/static/image/code.png">
</head>
<body class="body">

<div class="layui-row layui-col-space10 my-index-main">
    <form class="layui-form" action="">
        <div class="layui-form-item">
            <label class="layui-form-label">公告标题</label>
            <div class="layui-input-block">
                <input type="text" name="title" required lay-verify="required" placeholder="请输入公告标题" autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">公告内容</label>
            <div class="layui-input-block">
                <textarea name="content" required lay-verify="required" placeholder="请输入公告内容" class="layui-textarea" style="min-height:120px;"></textarea>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">排序</label>
            <div class="layui-input-block">
                <input type="number" name="sort" value="0" placeholder="数字越大越靠前" autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <div class="layui-input-block">
                <button class="layui-btn" lay-submit lay-filter="formDemo">添加公告</button>
                <button type="reset" class="layui-btn layui-btn-primary">重置</button>
            </div>
        </div>
    </form>

    <table class="layui-hide" id="noticelist" lay-filter="noticelist"></table>
    <script type="text/html" id="barDemo">
        <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="toggle">切换状态</a>
        <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
    </script>
    <script type="text/html" id="statusTpl">
        {{# if(d.status == 1) { }}
            <span class="layui-badge layui-bg-green">显示中</span>
        {{# } else { }}
            <span class="layui-badge">已隐藏</span>
        {{# } }}
    </script>
</div>

<script src="../../static/jquery-3.3.1.js"></script>
<script type="text/javascript" src="../../static/frame/layui/layui.js"></script>
<script type="text/javascript" src="../../static/js/index.js"></script>
<script type="text/javascript">
    layui.use(['form', 'table', 'element', 'layer', 'vip_tab'], function () {
        $('.my-nav-btn').on('click', function () {
            if ($(this).attr('data-href')) {
                vipTab.add($(this), '<i class="layui-icon">' + $(this).find("button").html() + '</i>' + $(this).find('p:last-child').html(), $(this).attr('data-href'));
            }
        });
        var table = layui.table, form = layui.form;

        table.render({
            elem: '#noticelist'
            , url: '../ajax.php?mod=getnoticelist'
            , cellMinWidth: 130
            , cols: [[
                {field: 'ID', title: 'ID', width: 60}
                , {field: 'title', title: '标题', edit: 'text'}
                , {field: 'content', title: '内容', edit: 'text'}
                , {field: 'sort', title: '排序', edit: 'text', width: 80}
                , {field: 'status', title: '状态', templet: '#statusTpl', width: 100}
                , {field: 'time', title: '添加时间', width: 170}
                , {toolbar: '#barDemo', title: '操作', width: 240}
            ]]
            , page: true
        });

        table.on('tool(noticelist)', function (obj) {
            var data = obj.data;
            if (obj.event === 'del') {
                layer.confirm('确定要删除公告「' + data.title + '」？', function (index) {
                    $.ajax({
                        url: '../ajax.php?mod=delnotice',
                        type: 'POST',
                        dataType: 'json',
                        data: 'id=' + data.ID,
                        success: function (data) {
                            obj.del();
                            layer.msg(data.msg);
                        },
                        error: function (data) { layer.msg('请求失败: ' + data); }
                    });
                    layer.close(index);
                });
            } else if (obj.event === 'toggle') {
                var newStatus = data.status == 1 ? 0 : 1;
                $.ajax({
                    url: '../ajax.php?mod=changenotice',
                    type: 'POST',
                    dataType: 'html',
                    data: 'id=' + data.ID + '&mod=status&value=' + newStatus,
                    success: function (res) {
                        layer.msg(res);
                        table.reload('noticelist', {url: '../ajax.php?mod=getnoticelist'});
                    },
                    error: function (data) { layer.msg('请求失败: ' + data); }
                });
            }
        });

        table.on('edit(noticelist)', function (obj) {
            $.ajax({
                url: '../ajax.php?mod=changenotice',
                type: 'POST',
                dataType: 'html',
                data: 'id=' + obj.data.ID + '&mod=' + obj.field + '&value=' + obj.value,
                success: function (data) { layer.msg(data); },
                error: function (data) { layer.msg('请求失败: ' + data); }
            });
        });

        form.on('submit', function (data) {
            var loading = layer.load();
            $.ajax({
                url: '../ajax.php?mod=addnotice',
                type: 'POST',
                dataType: 'json',
                data: 'title=' + encodeURIComponent(data.field.title) + '&content=' + encodeURIComponent(data.field.content) + '&sort=' + data.field.sort,
                success: function (data) {
                    layer.close(loading);
                    layer.msg(data.msg);
                    if (data.code == 1) {
                        $('input[name="title"]').val('');
                        $('textarea[name="content"]').val('');
                        $('input[name="sort"]').val('0');
                    }
                    table.reload('noticelist', {url: '../ajax.php?mod=getnoticelist'});
                },
                error: function (data) { layer.close(loading); layer.msg('请求失败: ' + data); }
            });
            return false;
        });
    });
</script>
</body>
</html>
